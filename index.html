<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Mini WebRTC P2P Video (STUN, manual signaling)</title>
  <style>
    body { font-family: Arial, sans-serif; max-width:800px; margin:20px; }
    video { width:48%; border:1px solid #ccc; background:#000; }
    textarea { width:100%; height:120px; }
    .row { display:flex; gap:8px; margin-bottom:8px; }
    .col { flex:1; }
    button { margin-right:8px; }
    small { color:#555; }
  </style>
</head>
<body>
  <h2>Mini WebRTC P2P Video — Manual Signaling</h2>
  <div class="row">
    <video id="localVideo" autoplay playsinline muted></video>
    <video id="remoteVideo" autoplay playsinline></video>
  </div>

  <div>
    <button id="startBtn">Start Local Video</button>
    <button id="createOfferBtn">Create Offer</button>
    <button id="createAnswerBtn">Create Answer</button>
    <button id="addRemoteDescBtn">Set Remote Description</button>
    <button id="gatherCandidatesBtn">Gather Candidates</button>
    <button id="closeBtn">Hang Up</button>
    <div><small>Uses public STUN: stun:stun.l.google.com:19302</small></div>
  </div>

  <h3>Local SDP / Candidate (copy to remote peer)</h3>
  <textarea id="localSDP" placeholder="Local SDP / ICE candidates appear here"></textarea>

  <h3>Remote SDP / Candidate (paste from remote peer)</h3>
  <textarea id="remoteSDP" placeholder="Paste remote SDP / ICE candidates here"></textarea>

  <script>
    // Config: public STUN server
    const iceServers = [{ urls: "stun:stun.l.google.com:19302" }];

    let pc = null;
    let localStream = null;
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const localSDP = document.getElementById('localSDP');
    const remoteSDP = document.getElementById('remoteSDP');

    // Simple function to create RTCPeerConnection
    function createPeerConnection() {
      pc = new RTCPeerConnection({ iceServers });

      // Show any gathered local ICE candidates appended to localSDP
      pc.onicecandidate = (evt) => {
        if (!evt.candidate) return;
        // Append candidate in a simple newline-separated form
        localSDP.value += "\n" + JSON.stringify({ candidate: evt.candidate });
      };

      // When remote track arrives, show it
      pc.ontrack = (evt) => {
        // For video we expect 1 stream/track
        if (remoteVideo.srcObject !== evt.streams[0]) {
          remoteVideo.srcObject = evt.streams[0];
        }
      };

      // Optional: log connection state changes
      pc.oniceconnectionstatechange = () => {
        console.log("ICE state:", pc.iceConnectionState);
      };

      return pc;
    }

    // Start local camera
    document.getElementById('startBtn').onclick = async () => {
      if (localStream) return;
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        localVideo.srcObject = localStream;

        if (!pc) createPeerConnection();
        // Add tracks
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        localSDP.value = "Local media started.\n";
      } catch (e) {
        alert("getUserMedia error: " + e);
      }
    };

    // Create Offer (caller)
    document.getElementById('createOfferBtn').onclick = async () => {
      if (!pc) createPeerConnection();
      try {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        // Output offer SDP
        localSDP.value = JSON.stringify({ type: pc.localDescription.type, sdp: pc.localDescription.sdp });
      } catch (e) {
        alert("Offer error: " + e);
      }
    };

    // Create Answer (callee) — expects remoteOffer pasted in remoteSDP first
    document.getElementById('createAnswerBtn').onclick = async () => {
      if (!pc) createPeerConnection();
      const remoteText = remoteSDP.value.trim();
      if (!remoteText) { alert('Paste remote offer into "Remote SDP" first'); return; }

      try {
        // If the local media hasn't been started, try to get permission now
        if (!localStream) {
          localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
          localVideo.srcObject = localStream;
          localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        }

        const remoteObj = JSON.parse(remoteText);
        await pc.setRemoteDescription(remoteObj);
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        localSDP.value = JSON.stringify({ type: pc.localDescription.type, sdp: pc.localDescription.sdp });
      } catch (e) {
        alert("Answer error: " + e);
      }
    };

    // Set remote description (used by both sides after copying remote SDP)
    document.getElementById('addRemoteDescBtn').onclick = async () => {
      const text = remoteSDP.value.trim();
      if (!text) { alert('Paste remote text into "Remote SDP"'); return; }
      if (!pc) createPeerConnection();
      try {
        // The remote side may have pasted either an SDP object or multiple candidate lines.
        // Try parse as JSON. If it's a candidate line list, apply them.
        const obj = JSON.parse(text);
        if (obj.sdp && obj.type) {
          await pc.setRemoteDescription(obj);
          localSDP.value += "\nRemote description set.";
        } else if (obj.candidate) {
          await pc.addIceCandidate(obj.candidate).catch(e => console.warn(e));
          localSDP.value += "\nRemote candidate added.";
        } else {
          alert("Unrecognized JSON object. Paste offer/answer SDP JSON or individual candidate JSON lines.");
        }
      } catch (e) {
        // If not JSON, maybe multiple lines of candidate JSON; try to split
        const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
        for (const line of lines) {
          try {
            const parsed = JSON.parse(line);
            if (parsed.type && parsed.sdp) {
              await pc.setRemoteDescription(parsed);
              localSDP.value += "\nRemote description set.";
            } else if (parsed.candidate) {
              await pc.addIceCandidate(parsed.candidate).catch(err => console.warn(err));
              localSDP.value += "\nRemote candidate added.";
            }
          } catch (err) {
            console.warn("Ignored line:", line);
          }
        }
      }
    };

    // Optionally gather candidates (triggered automatically by setLocalDescription in browsers)
    document.getElementById('gatherCandidatesBtn').onclick = async () => {
      // In most browsers candidates appear automatically via onicecandidate; this button is mostly informational.
      if (!pc) createPeerConnection();
      localSDP.value += "\nGathering candidates (check console for ICE state).";
    };

    // Hang up / close
    document.getElementById('closeBtn').onclick = () => {
      if (pc) {
        pc.getSenders().forEach(s => { try { if (s.track) s.track.stop(); } catch(e){} });
        pc.close();
        pc = null;
      }
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
      }
      localVideo.srcObject = null;
      remoteVideo.srcObject = null;
      localSDP.value = "";
      remoteSDP.value = "";
    };

    // When page unload, clean up
    window.addEventListener('beforeunload', () => {
      if (pc) pc.close();
      if (localStream) localStream.getTracks().forEach(t=>t.stop());
    });
  </script>
</body>
</html>
