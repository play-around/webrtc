<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mobile WebRTC P2P Video (Manual Signaling)</title>
<style>
  :root { font-family: system-ui, -apple-system, Roboto, "Helvetica Neue", Arial; color:#111; }
  body { margin:0; padding:12px; box-sizing:border-box; background:#f7f8fa; }
  header { text-align:center; margin-bottom:8px; }
  h1 { font-size:18px; margin:6px 0; }
  .videos { display:flex; gap:8px; flex-direction:column; }
  video { width:100%; height:auto; background:#000; border-radius:8px; max-height:40vh; object-fit:cover; }
  .controls { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; justify-content:center; }
  button { flex:1 1 45%; min-height:44px; font-size:15px; border-radius:8px; border:0; background:#2563eb; color:#fff; padding:10px; }
  button.secondary { background:#e5e7eb; color:#111; }
  .note { font-size:12px; color:#555; text-align:center; margin-top:6px; }
  textarea { width:100%; min-height:120px; resize:vertical; padding:8px; border-radius:8px; border:1px solid #ddd; font-size:13px; margin-top:8px; }
  .row { display:flex; gap:8px; margin-top:8px; }
  .small-btn { flex:1; min-height:40px; font-size:13px; border-radius:8px; }
  footer { margin-top:10px; font-size:12px; color:#666; text-align:center; }
  @media(min-width:720px){
    .videos{ flex-direction:row; }
    video{ width:48%; max-height:60vh; }
    button{ flex:1 1 18%; min-width:120px; }
  }
</style>
</head>
<body>
<header>
  <h1>Mobile WebRTC — Manual Signaling</h1>
  <div class="note">Uses public STUN: <strong>stun:stun.l.google.com:19302</strong>. Copy/paste SDPs between peers.</div>
</header>

<section class="videos">
  <video id="localVideo" autoplay playsinline muted></video>
  <video id="remoteVideo" autoplay playsinline></video>
</section>

<div class="controls" role="toolbar" aria-label="controls">
  <button id="startBtn">Start Camera</button>
  <button id="createOfferBtn" class="secondary">Create Offer</button>
  <button id="createAnswerBtn" class="secondary">Create Answer</button>
  <button id="addRemoteDescBtn" class="secondary">Set Remote</button>
  <button id="closeBtn" class="secondary">Hang Up</button>
</div>

<div>
  <label for="localSDP" class="note">Local SDP / candidates (tap Copy to send)</label>
  <textarea id="localSDP" readonly placeholder="Local SDP and candidates appear here"></textarea>
  <div class="row">
    <button id="copyLocal" class="small-btn">Copy Local</button>
    <button id="clearLocal" class="small-btn secondary">Clear</button>
  </div>

  <label for="remoteSDP" class="note">Remote SDP / candidates (paste here)</label>
  <textarea id="remoteSDP" placeholder="Paste remote SDP / candidates here"></textarea>
  <div class="row">
    <button id="pasteRemote" class="small-btn">Apply Paste</button>
    <button id="clearRemote" class="small-btn secondary">Clear</button>
  </div>
</div>

<footer>Tip: Paste entire textarea contents; the app will parse and apply SDP and candidate JSON lines automatically.</footer>

<script>
const iceServers = [{ urls: "stun:stun.l.google.com:19302" }];

let pc = null;
let localStream = null;
const localVideo = document.getElementById('localVideo');
const remoteVideo = document.getElementById('remoteVideo');
const localSDP = document.getElementById('localSDP');
const remoteSDP = document.getElementById('remoteSDP');

function createPeerConnection() {
  if (pc) return pc;
  pc = new RTCPeerConnection({ iceServers });

  pc.onicecandidate = (evt) => {
    if (!evt.candidate) return;
    appendLocal(JSON.stringify({ candidate: evt.candidate }));
  };

  pc.ontrack = (evt) => {
    if (remoteVideo.srcObject !== evt.streams[0]) remoteVideo.srcObject = evt.streams[0];
  };

  pc.oniceconnectionstatechange = () => {
    appendLocal("// ICE state: " + pc.iceConnectionState);
  };

  return pc;
}

function appendLocal(text) {
  localSDP.value = (localSDP.value ? localSDP.value + "\n" : "") + text;
  localSDP.scrollTop = localSDP.scrollHeight;
}

async function startCamera() {
  if (localStream) return;
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
    localVideo.srcObject = localStream;
    createPeerConnection();
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
    appendLocal("// Local media started");
  } catch (e) {
    alert("Camera/mic error: " + (e && e.message ? e.message : e));
  }
}

async function createOffer() {
  createPeerConnection();
  try {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    appendLocal(JSON.stringify({ type: pc.localDescription.type, sdp: pc.localDescription.sdp }));
  } catch (e) {
    alert("Offer error: " + (e && e.message ? e.message : e));
  }
}

async function createAnswer() {
  createPeerConnection();
  try {
    // Ensure remote offer is present and not already applied
    const remoteObj = await parseFirstSDP(remoteSDP.value);
    if (!remoteObj || remoteObj.type !== 'offer') { alert("Paste a remote OFFER before creating an answer."); return; }

    // Only set remote if peer is in 'stable' (expecting offer) or remoteDescription not set
    if (!pc.remoteDescription || pc.signalingState === 'stable') {
      await pc.setRemoteDescription(remoteObj);
      appendLocal("// Remote offer set");
    } else {
      appendLocal("// Remote offer already set or signalingState=" + pc.signalingState);
    }

    if (!localStream) await startCamera();
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    appendLocal(JSON.stringify({ type: pc.localDescription.type, sdp: pc.localDescription.sdp }));

    // Also apply any candidate lines that came with the pasted offer
    await applyCandidatesFromText(remoteSDP.value);
  } catch (e) {
    alert("Answer error: " + (e && e.message ? e.message : e));
  }
}

async function setRemote() {
  const text = remoteSDP.value.trim();
  if (!text) { alert("Paste remote SDP/candidates first"); return; }
  createPeerConnection();
  try {
    // Try to find an SDP object (offer or answer) in the pasted text
    const sdpObj = await parseFirstSDP(text);

    if (sdpObj) {
      const state = pc.signalingState;
      if (sdpObj.type === 'offer') {
        // we can accept an offer only when stable (we are caller-free)
        if (state === 'stable' && (!pc.remoteDescription || !pc.remoteDescription.sdp)) {
          await pc.setRemoteDescription(sdpObj);
          appendLocal("// Remote offer set via Set Remote");
        } else {
          appendLocal("// Ignored remote offer — signalingState=" + state);
        }
      } else if (sdpObj.type === 'answer') {
        // we can accept an answer only when we previously set a local offer
        if (state === 'have-local-offer' || (pc.localDescription && pc.localDescription.type === 'offer' && !pc.remoteDescription)) {
          await pc.setRemoteDescription(sdpObj);
          appendLocal("// Remote answer set via Set Remote");
        } else {
          appendLocal("// Ignored remote answer — signalingState=" + state);
        }
      }
    }

    // Apply any candidate lines found in the pasted text
    await applyCandidatesFromText(text);
  } catch (e) {
    alert("Set remote error: " + (e && e.message ? e.message : e));
  }
}

async function parseFirstSDP(text) {
  if (!text) return null;
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  for (const line of lines) {
    try {
      const parsed = JSON.parse(line);
      if (parsed && parsed.sdp && parsed.type) return parsed;
    } catch(e){}
  }
  return null;
}

async function applyCandidatesFromText(text) {
  if (!text) return;
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  for (const line of lines) {
    try {
      const parsed = JSON.parse(line);
      if (parsed && parsed.candidate) {
        // addIceCandidate is tolerant of duplicates in many browsers; catch errors
        await pc.addIceCandidate(parsed.candidate).catch(e => {
          console.warn("addIceCandidate failed:", e);
        });
      }
    } catch(e){}
  }
}

function hangUp() {
  if (pc) {
    try {
      pc.getSenders().forEach(s=>{ try{ if(s.track) s.track.stop(); }catch(e){} });
      pc.close();
    } catch(e){}
    pc=null;
  }
  if (localStream) { localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
  localVideo.srcObject = null;
  remoteVideo.srcObject = null;
  localSDP.value = "";
  remoteSDP.value = "";
}

// Clipboard helpers
async function copyLocalToClipboard(){
  try {
    await navigator.clipboard.writeText(localSDP.value);
    alert("Local SDP copied to clipboard");
  } catch (e) {
    prompt("Copy this text manually:", localSDP.value);
  }
}
async function pasteFromClipboardToRemote(){
  try {
    const txt = await navigator.clipboard.readText();
    remoteSDP.value = txt;
    alert("Pasted clipboard to Remote textarea");
  } catch (e) {
    alert("Clipboard read failed: paste manually");
  }
}

// UI wiring
document.getElementById('startBtn').onclick = startCamera;
document.getElementById('createOfferBtn').onclick = createOffer;
document.getElementById('createAnswerBtn').onclick = createAnswer;
document.getElementById('addRemoteDescBtn').onclick = setRemote;
document.getElementById('closeBtn').onclick = hangUp;
document.getElementById('copyLocal').onclick = copyLocalToClipboard;
document.getElementById('clearLocal').onclick = ()=> localSDP.value = "";
document.getElementById('pasteRemote').onclick = async ()=> { await pasteFromClipboardToRemote(); /* do not auto-set remote; user can tap Set Remote or Create Answer */ };
document.getElementById('clearRemote').onclick = ()=> remoteSDP.value = "";

// cleanup
window.addEventListener('beforeunload', hangUp);
</script>
</body>
</html>
